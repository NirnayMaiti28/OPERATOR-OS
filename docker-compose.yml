version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - CONDUCTOR_DB_PATH=/app/data/conductor.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - NEWSAPI_API_KEY=${NEWSAPI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - EXCHANGERATE_API_KEY=${EXCHANGERATE_API_KEY}
    volumes:
      - conductor_db:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: ui-builder
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    command: ["pnpm", "--filter", "@workspace/conductor-ui", "run", "serve"]
    restart: unless-stopped

volumes:
  conductor_db:
